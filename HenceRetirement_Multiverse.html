document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {

      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }

      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +

            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

>✦<\u002Fspan><\u002Fdiv><div style=\"border:1.5px solid #E4DECF;border-radius:13px;padding:12px 13px;display:flex;align-items:center;gap:11px;\"><span style=\"width:26px;height:26px;border-radius:8px;background:#F1ECDF;color:#A39B88;display:flex;align-items:center;justify-content:center;font:600 11px 'Hanken Grotesk';flex:0 0 auto;\">2<\u002Fspan><div style=\"flex:1;\"><div style=\"font:600 13px 'Hanken Grotesk';\">Inflation<\u002Fdiv><div style=\"font:500 9.5px 'Geist Mono';color:#A39B88;\">~2 min<\u002Fdiv><\u002Fdiv><span style=\"color:#C9C0AD;font-size:15px;\">✦<\u002Fspan><\u002Fdiv><div style=\"border:1.5px solid #E4DECF;border-radius:13px;padding:12px 13px;display:flex;align-items:center;gap:11px;\"><span style=\"width:26px;height:26px;border-radius:8px;background:#F1ECDF;color:#A39B88;display:flex;align-items:center;justify-content:center;font:600 11px 'Hanken Grotesk';flex:0 0 auto;\">3<\u002Fspan><div style=\"flex:1;\"><div style=\"font:600 13px 'Hanken Grotesk';\">Roth IRA<\u002Fdiv><div style=\"font:500 9.5px 'Geist Mono';color:#A39B88;\">~3 min<\u002Fdiv><\u002Fdiv><span style=\"color:#C9C0AD;font-size:15px;\">✦<\u002Fspan><\u002Fdiv><div style=\"border:1.5px solid #E4DECF;border-radius:13px;padding:12px 13px;display:flex;align-items:center;gap:11px;\"><span style=\"width:26px;height:26px;border-radius:8px;background:#F1ECDF;color:#A39B88;display:flex;align-items:center;justify-content:center;font:600 11px 'Hanken Grotesk';flex:0 0 auto;\">4<\u002Fspan><div style=\"flex:1;\"><div style=\"font:600 13px 'Hanken Grotesk';\">Social Security timing<\u002Fdiv><div style=\"font:500 9.5px 'Geist Mono';color:#A39B88;\">~2 min<\u002Fdiv><\u002Fdiv><span style=\"color:#C9C0AD;font-size:15px;\">✦<\u002Fspan><\u002Fdiv><div style=\"border:1.5px solid #E4DECF;border-radius:13px;padding:12px 13px;display:flex;align-items:center;gap:11px;\"><span style=\"width:26px;height:26px;border-radius:8px;background:#F1ECDF;color:#A39B88;display:flex;align-items:center;justify-content:center;font:600 11px 'Hanken Grotesk';flex:0 0 auto;\">5<\u002Fspan><div style=\"flex:1;\"><div style=\"font:600 13px 'Hanken Grotesk';\">Medicare basics<\u002Fdiv><div style=\"font:500 9.5px 'Geist Mono';color:#A39B88;\">~3 min<\u002Fdiv><\u002Fdiv><span style=\"color:#C9C0AD;font-size:15px;\">✦<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"margin-top:auto;background:#211C13;color:#FBFAF6;font:600 14px 'Hanken Grotesk';padding:15px;border-radius:14px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;\">Start with compounding <span style=\"font-size:15px;\">→<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"font:500 10.5px 'Geist Mono',monospace;color:#A39B88;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;\">04 · Your learning path<\u002Fdiv><\u002Fdiv><div style=\"flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:13px;\"><div style=\"width:296px;height:1080px;background:linear-gradient(160deg,#26282A,#161718);border:1px solid #34363A;border-radius:44px;padding:9px;box-shadow:0 30px 60px -22px rgba(8,10,12,.5),0 6px 16px rgba(8,10,12,.2);box-sizing:border-box;\"><div style=\"position:relative;width:100%;height:100%;border-radius:36px;overflow:hidden;background:#FBFAF6;display:flex;flex-direction:column;\"><div style=\"display:flex;align-items:center;justify-content:space-between;padding:13px 22px 4px;flex:0 0 auto;\"><span style=\"font:600 13px 'Hanken Grotesk',sans-serif;\">9:41<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"display:inline-flex;align-items:flex-end;gap:2px;height:10px;\"><i style=\"width:3px;height:4px;background:#211C13;border-radius:1px;\"><\u002Fi><i style=\"width:3px;height:6px;background:#211C13;border-radius:1px;\"><\u002Fi><i style=\"width:3px;height:8px;background:#211C13;border-radius:1px;\"><\u002Fi><i style=\"width:3px;height:10px;background:#211C13;border-radius:1px;\"><\u002Fi><\u002Fspan><span style=\"width:22px;height:11px;border:1.5px solid #211C13;border-radius:3px;position:relative;display:inline-block;\"><i style=\"position:absolute;top:1.5px;left:1.5px;bottom:1.5px;width:12px;background:#211C13;border-radius:1px;\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"flex:1;overflow:hidden;padding:8px 21px 20px;display:flex;flex-direction:column;\"><div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\"><span style=\"font:500 10px 'Geist Mono';letter-spacing:.13em;text-transform:uppercase;color:#A39B88;\">Explainer 1 of 5<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:5px;background:#C7E0CE;color:#14503A;border-radius:16px;padding:6px 11px;font:600 11px 'Hanken Grotesk';\">Saved ✓<\u002Fspan><\u002Fdiv><h2 style=\"font:300 27px/1.08 Spectral,serif;letter-spacing:-.01em;margin-bottom:9px;\">Compound interest<\u002Fh2>\n<p style=\"font:400 13.5px/1.55 'Hanken Grotesk';color:#5E5647;margin-bottom:11px;\">Your money earns money. Then <em>that<\u002Fem> money earns money too. It starts slow — then it snowballs.<\u002Fp>\n<p style=\"font:400 12.5px/1.5 'Hanken Grotesk';color:#8A8270;margin-bottom:15px;\">The size of your snowball comes down to two things you can picture: how much you add each month, and the rate it grows at. Tiny changes to either — repeated for decades — end up huge. Try it below.<\u002Fp>\n<div style=\"background:#F1ECDF;border-radius:16px;padding:14px 14px 15px;margin-bottom:14px;\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;\"><span style=\"font:500 10.5px 'Geist Mono';letter-spacing:.1em;text-transform:uppercase;color:#5E5647;\">Show me how it works<\u002Fspan><span style=\"font:500 8.5px 'Geist Mono';letter-spacing:.12em;color:#FBFAF6;background:#B6786E;border-radius:10px;padding:3px 8px;\">DRAG TO TRY<\u002Fspan><\u002Fdiv>\n<div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:7px;height:94px;\"><div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;\"><span ref=\"{{ bar0Ref }}\" style=\"width:100%;height:6px;background:#C9BFA9;border-radius:5px;\"><\u002Fspan><span style=\"font:500 8px 'Geist Mono';color:#A39B88;\">25<\u002Fspan><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;\"><span ref=\"{{ bar1Ref }}\" style=\"width:100%;height:6px;background:#C9BFA9;border-radius:5px;\"><\u002Fspan><span style=\"font:500 8px 'Geist Mono';color:#A39B88;\">35<\u002Fspan><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;\"><span ref=\"{{ bar2Ref }}\" style=\"width:100%;height:12px;background:#C9BFA9;border-radius:5px;\"><\u002Fspan><span style=\"font:500 8px 'Geist Mono';color:#A39B88;\">45<\u002Fspan><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;\"><span ref=\"{{ bar3Ref }}\" style=\"width:100%;height:27px;background:#C9BFA9;border-radius:5px;\"><\u002Fspan><span style=\"font:500 8px 'Geist Mono';color:#A39B88;\">55<\u002Fspan><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;\"><span ref=\"{{ bar4Ref }}\" style=\"width:100%;height:54px;background:#211C13;border-radius:5px;\"><\u002Fspan><span style=\"font:500 8px 'Geist Mono';color:#211C13;\">65<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div style=\"border-top:1px solid #E0D9C7;margin-top:11px;padding-top:10px;display:flex;align-items:baseline;justify-content:space-between;\"><span style=\"font:400 11px 'Hanken Grotesk';color:#8A8270;\">Your balance by 65, starting at 25<\u002Fspan><span ref=\"{{ cmTotalRef }}\" style=\"font:300 26px Spectral,serif;color:#211C13;\">$398k<\u002Fspan><\u002Fdiv>\n<div style=\"margin-top:13px;\"><div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;\"><span style=\"font:600 11.5px 'Hanken Grotesk';\">Monthly contribution<\u002Fspan><span ref=\"{{ pmtValRef }}\" style=\"font:600 12px 'Hanken Grotesk';\">$200<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"50\" max=\"1000\" step=\"25\" value=\"200\" oninput=\"{{ onCmInput }}\" onchange=\"{{ onCmInput }}\" ref=\"{{ pmtInputRef }}\" style=\"width:100%;accent-color:#211C13;margin-top:5px;\"><\u002Fdiv>\n<div style=\"margin-top:12px;\"><div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;\"><span style=\"font:600 11.5px 'Hanken Grotesk';\">Annual return<\u002Fspan><span ref=\"{{ rateValRef }}\" style=\"font:600 12px 'Hanken Grotesk';\">6.0%<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"2\" max=\"10\" step=\"0.5\" value=\"6\" oninput=\"{{ onCmInput }}\" onchange=\"{{ onCmInput }}\" ref=\"{{ rateInputRef }}\" style=\"width:100%;accent-color:#211C13;margin-top:5px;\"><div ref=\"{{ rateGuideRef }}\" style=\"margin-top:8px;\"><span style=\"display:inline-block;font:600 9px 'Geist Mono';letter-spacing:.08em;text-transform:uppercase;color:#B6786E;margin-right:6px;\">Reasonable<\u002Fspan><span style=\"font:400 11px/1.4 'Hanken Grotesk';color:#5E5647;\">A balanced mix of stocks and bonds — a realistic long-run average.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div style=\"margin-top:11px;border-top:1px solid #E0D9C7;padding-top:9px;font:400 10px/1.45 'Hanken Grotesk';color:#8A8270;\">Under <strong>4%<\u002Fstrong> barely beats inflation · <strong>5–7%<\u002Fstrong> is a realistic long-run average · over <strong>9%<\u002Fstrong> is risky to count on.<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"display:flex;align-items:center;gap:11px;background:#FBFAF6;border:1px solid #E4DECF;border-radius:13px;padding:11px 12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;border-radius:50%;background:#211C13;color:#FBFAF6;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:12px;\">▶<\u002Fspan><div><div style=\"font:600 12px 'Hanken Grotesk';\">Listen · 2 min<\u002Fdiv><div style=\"font:400 10.5px 'Hanken Grotesk';color:#A39B88;\">How a snowball becomes an avalanche<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div style=\"background:#211C13;color:#FBFAF6;border-radius:14px;padding:13px 14px;margin-bottom:14px;\"><div style=\"font:500 9px 'Geist Mono';letter-spacing:.12em;color:#A8A08C;margin-bottom:5px;\">KEY TAKEAWAY<\u002Fdiv><div style=\"font:400 13px/1.4 'Hanken Grotesk';\">Starting ten years earlier can nearly double what you end up with — even saving the same amount.<\u002Fdiv><\u002Fdiv>\n<div style=\"margin-top:auto;background:#211C13;color:#FBFAF6;font:600 14px 'Hanken Grotesk';padding:15px;border-radius:14px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;\">Next concept <span style=\"font-size:15px;\">→<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"font:500 10.5px 'Geist Mono',monospace;color:#A39B88;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;\">05 · Explainer · Compounding<\u002Fdiv><\u002Fdiv><div style=\"flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:13px;\"><div style=\"width:296px;height:1015px;background:linear-gradient(160deg,#26282A,#161718);border:1px solid #34363A;border-radius:44px;padding:9px;box-shadow:0 30px 60px -22px rgba(8,10,12,.5),0 6px 16px rgba(8,10,12,.2);box-sizing:border-box;\"><div style=\"position:relative;width:100%;height:100%;border-radius:36px;overflow:hidden;background:#FBFAF6;display:flex;flex-direction:column;\"><div style=\"display:flex;align-items:center;justify-content:space-between;padding:13px 22px 4px;flex:0 0 auto;\"><span style=\"font:600 13px 'Hanken Grotesk',sans-serif;\">9:41<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"display:inline-flex;align-items:flex-end;gap:2px;height:10px;\"><i style=\"width:3px;height:4px;background:#211C13;border-radius:1px;\"><\u002Fi><i style=\"width:3px;height:6px;background:#211C13;border-radius:1px;\"><\u002Fi><i style=\"width:3px;height:8px;background:#211C13;border-radius:1px;\"><\u002Fi><i style=\"width:3px;height:10px;background:#211C13;border-radius:1px;\"><\u002Fi><\u002Fspan><span style=\"width:22px;height:11px;border:1.5px solid #211C13;border-radius:3px;position:relative;display:inline-block;\"><i style=\"position:absolute;top:1.5px;left:1.5px;bottom:1.5px;width:12px;background:#211C13;border-radius:1px;\"><\u002Fi><\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"flex:1;overflow:hidden;padding:8px 21px 20px;display:flex;flex-direction:column;\"><div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\"><span style=\"font:500 10px 'Geist Mono';letter-spacing:.13em;text-transform:uppercase;color:#A39B88;\">Explainer 2 of 5<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:5px;border:1.5px solid #211C13;border-radius:16px;padding:5px 11px;font:600 11px 'Hanken Grotesk';\">✦ Save<\u002Fspan><\u002Fdiv><h2 style=\"font:300 27px/1.08 Spectral,serif;letter-spacing:-.01em;margin-bottom:9px;\">Inflation<\u002Fh2>\n<p style=\"font:400 13.5px/1.55 'Hanken Grotesk';color:#5E5647;margin-bottom:11px;\">The same life quietly costs more each year. $100 today buys about $55 of the same stuff in 25 years — without you spending a cent differently.<\u002Fp>\n<p style=\"font:400 12.5px/1.5 'Hanken Grotesk';color:#8A8270;margin-bottom:14px;\">That’s why a number that looks like plenty today can fall short by the time you retire. We plan in <em>today’s dollars<\u002Fem> so it always feels real.<\u002Fp>\n<div style=\"background:#F1ECDF;border-radius:16px;padding:16px 14px 12px;margin-bottom:15px;\"><div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:7px;height:84px;\"><div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;\"><span style=\"font:600 9px 'Hanken Grotesk';color:#211C13;\">$100<\u002Fspan><span style=\"width:100%;height:80px;background:#211C13;border-radius:5px;\"><\u002Fspan><span style=\"font:500 8px 'Geist Mono';color:#A39B88;\">NOW<\u002Fspan><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;\"><span style=\"font:600 9px 'Hanken Grotesk';color:#B6786E;\">$78<\u002Fspan><span style=\"width:100%;height:60px;background:#CD9C93;border-radius:5px;\"><\u002Fspan><span style=\"font:500 8px 'Geist Mono';color:#A39B88;\">+10<\u002Fspan><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;\"><span style=\"font:600 9px 'Hanken Grotesk';color:#B6786E;\">$61<\u002Fspan><span style=\"width:100%;height:44px;background:#CD9C93;border-radius:5px;\"><\u002Fspan><span style=\"font:500 8px 'Geist Mono';color:#A39B88;\">+20<\u002Fspan><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;\"><span style=\"font:600 9px 'Hanken Grotesk';color:#B6786E;\">$55<\u002Fspan><span style=\"width:100%;height:38px;background:#CD9C93;border-radius:5px;\"><\u002Fspan><span style=\"font:500 8px 'Geist Mono';color:#A39B88;\">+25<\u002Fspan><\u002Fdiv><\u002Fdiv><div style=\"border-top:1px solid #E0D9C7;margin-top:8px;padding-top:8px;font:400 10.5px 'Hanken Grotesk';color:#8A8270;\">Buying power of $100 over time, at ~2.5% inflation.<\u002Fdiv><\u002Fdiv>\n<h3 style=\"font:300 19px/1.2 Spectral,serif;letter-spacing:-.01em;margin-bottom:7px;\">What creates inflation?<\u002Fh3>\n<p style=\"font:400 12.5px/1.5 'Hanken Grotesk';color:#5E5647;margin-bottom:11px;\">Prices drift up when there’s more money chasing the same goods. A few forces push it along — and a little inflation is actually healthy. Central banks aim for around 2% a year.<\u002Fp>\n<div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:15px;\"><div style=\"display:flex;align-items:flex-start;gap:9px;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#B6786E;margin-top:6px;flex:0 0 auto;\"><\u002Fspan><div><span style=\"font:600 12px 'Hanken Grotesk';\">More demand than supply<\u002Fspan> <span style=\"font:400 11.5px 'Hanken Grotesk';color:#8A8270;\">— Shoppers want more than is available<\u002Fspan><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:flex-start;gap:9px;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#B6786E;margin-top:6px;flex:0 0 auto;\"><\u002Fspan><div><span style=\"font:600 12px 'Hanken Grotesk';\">Rising wages &amp; costs<\u002Fspan> <span style=\"font:400 11.5px 'Hanken Grotesk';color:#8A8270;\">— It costs businesses more to make things<\u002Fspan><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:flex-start;gap:9px;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#B6786E;margin-top:6px;flex:0 0 auto;\"><\u002Fspan><div><span style=\"font:600 12px 'Hanken Grotesk';\">More money in circulation<\u002Fspan> <span style=\"font:400 11.5px 'Hanken Grotesk';color:#8A8270;\">— Extra cash in the system lifts prices<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<p style=\"font:400 12px/1.45 'Hanken Grotesk';color:#8A8270;margin-bottom:10px;\">See how it quietly adds up over a lifetime:<\u002Fp>\n<div style=\"border-radius:13px;overflow:hidden;margin-bottom:14px;border:1px solid #E4DECF;\"><div style=\"height:82px;background:repeating-linear-gradient(135deg,#ECE6D7,#ECE6D7 9px,#E4DDCC 9px,#E4DDCC 18px);display:flex;align-items:center;justify-content:center;\"><span style=\"width:38px;height:38px;border-radius:50%;background:rgba(33,28,19,.92);color:#FBFAF6;display:flex;align-items:center;justify-content:center;font-size:13px;\">▶<\u002Fspan><\u002Fdiv><div style=\"padding:9px 12px;display:flex;align-items:center;justify-content:space-between;\"><span style=\"font:600 11.5px 'Hanken Grotesk';\">Watch · 90 sec · Why prices rise<\u002Fspan><span style=\"font:500 9.5px 'Geist Mono';color:#A39B88;\">VIDEO<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div style=\"background:#211C13;color:#FBFAF6;border-radius:14px;padding:13px 14px;margin-bottom:14px;\"><div style=\"font:500 9px 'Geist Mono';letter-spacing:.12em;color:#
