document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dius:999px;\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"font:400 12.5px/1.45 'Nunito'; color:#8B8068; text-align:center; min-height:54px;\">{{ glance2Summary }}<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:10px;\">\n                <div onclick=\"{{ glance2Prev }}\" style=\"width:34px;height:34px;border-radius:12px;border:1px solid #D8CCAE;background:#FFFDF6;display:flex;align-items:center;justify-content:center;color:#8B8068;font:500 17px 'Nunito';cursor:pointer;\">‹<\u002Fdiv>\n                <div style=\"display:flex; gap:6px;\"><sc-for list=\"{{ glance2Dots }}\" as=\"c\" hint-placeholder-count=\"9\"><span style=\"width:7px; height:7px; border-radius:50%; background:{{ c }};\"><\u002Fspan><\u002Fsc-for><\u002Fdiv>\n                <div onclick=\"{{ glance2Next }}\" style=\"width:34px;height:34px;border-radius:12px;border:1px solid #D8CCAE;background:#FFFDF6;display:flex;align-items:center;justify-content:center;color:#8B8068;font:500 17px 'Nunito';cursor:pointer;\">›<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:center; margin-top:10px;\"><span style=\"font:700 12px 'Nunito'; color:#E86A3E;\">View details →<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdc-import>\n\n      <div style=\"flex:0 0 290px; padding-top:10px; display:flex; flex-direction:column; gap:14px;\">\n        <div style=\"font-family:'DM Mono',monospace; font-size:11px; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:#8B8068;\">Action-first home<\u002Fdiv>\n        <div style=\"font:400 14px/1.6 'Nunito'; color:#6f6650;\">Opens with a <strong style=\"color:#2C2A24; font-weight:700;\">plain-language summary<\u002Fstrong> of what matters right now — no carousel, no scanning.<\u002Fdiv>\n        <div style=\"font:400 14px/1.6 'Nunito'; color:#6f6650;\">Then the curated moves: <strong style=\"color:#2C2A24; font-weight:700;\">Where to Focus<\u002Fstrong> and <strong style=\"color:#2C2A24; font-weight:700;\">What We're Doing For You<\u002Fstrong>.<\u002Fdiv>\n        <div style=\"height:2px; background:#DCD0B4; border-radius:2px; margin:4px 0;\"><\u002Fdiv>\n        <div style=\"font:400 13.5px/1.6 'Nunito'; color:#6f6650;\">The full <strong style=\"color:#2C2A24; font-weight:700;\">At a Glance<\u002Fstrong> carousel drops to the bottom — there to swipe through when you want it, but no longer the headline.<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FINALE ===================== -->\n  <section style=\"margin-bottom:40px;\">\n    <div style=\"display:flex; align-items:center; gap:16px; margin-bottom:28px;\">\n      <div style=\"width:30px; height:30px; border-radius:10px; background:#2C2A24; color:#FFF7EC; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:600; font-size:15px;\">★<\u002Fdiv>\n      <div style=\"flex:0 0 auto;\"><div style=\"font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.12em; color:#8B8068; text-transform:uppercase;\">Finale<\u002Fdiv><div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:24px; letter-spacing:-.01em; color:#2C2A24;\">You're all set<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1 1 auto; height:2px; background:#DCD0B4; border-radius:2px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:30px; align-items:flex-start;\">\n      <dc-import name=\"BoardPhone\" caption=\"Share your map\" h=\"700\" tint=\"#2A2520\" dark=\"true\" hint-size=\"318px,720px\">\n        <div style=\"flex:1; display:flex; flex-direction:column; padding:10px 22px 0; text-align:center;\">\n          <div style=\"font-family:'DM Mono',monospace; font-size:10.5px; font-weight:500; letter-spacing:.14em; color:#F2884F; margin-top:6px; margin-bottom:auto;\">YOU MADE IT<\u002Fdiv>\n          <div style=\"aspect-ratio:1/1; width:100%; border-radius:24px; overflow:hidden; background:linear-gradient(150deg,#E86A3E,#F2B23E 90%); padding:22px; display:flex; flex-direction:column; justify-content:space-between;\">\n            <div style=\"display:flex; justify-content:center; gap:8px;\"><dc-import name=\"DimToken\" k=\"family\" size=\"56\" hint-size=\"56px,56px\"><\u002Fdc-import><dc-import name=\"DimToken\" k=\"car\" size=\"56\" hint-size=\"56px,56px\"><\u002Fdc-import><dc-import name=\"DimToken\" k=\"grad\" size=\"56\" hint-size=\"56px,56px\"><\u002Fdc-import><\u002Fdiv>\n            <div><div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:23px; line-height:1.18; color:#fff;\">Nine dimensions. One map. All yours.<\u002Fdiv><div style=\"font-family:'DM Mono',monospace; font-size:9.5px; letter-spacing:.14em; color:rgba(255,255,255,.8); margin-top:14px;\">MONEY MAP · HENCE<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:auto; padding:18px 0 24px;\"><div style=\"width:100%; height:54px; border-radius:16px; background:#FFF7EC; color:#2C2A24; display:flex; align-items:center; justify-content:center; font-family:'Fredoka'; font-weight:600; font-size:16px; margin-bottom:10px;\">Share my map<\u002Fdiv><div style=\"text-align:center; font:700 13px 'Nunito'; color:rgba(255,255,255,.75);\">Visit My Hence<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdc-import>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { overlay: null, menuOpen: false, glance: 3, glance2: 3, share: 0 };\n\n  data() {\n    const POS = '#2E8B57', AMB = '#C98A22', GAP = '#DB5A3A';\n    return {\n      you: { k:'you', title:'You', status:POS, metric:'Profile complete', sub:'Your life, work & what matters',\n        doingHead:'We know you well.', summary:'Partnered, one dependent, salaried in Harrisburg. Enough to tailor everything that follows.',\n        focus:[{t:'Keep your profile current', s:'Tell us when life changes — it reshapes your plan.'}],\n        doing:[{t:'Pre-filled your tax profile', s:'Ready for tax season', kind:'Done'},{t:'Tuned guidance to your life stage', s:'Family-forward priorities', kind:'Done'}],\n        options:[{t:'Money & a growing family', s:'Guide · 7 min', kind:'guide'},{t:'Update what matters to you', s:'Takes 2 minutes', kind:'plan'}],\n        rows:[{label:'Age · Location', value:'37 · Harrisburg, PA'},{label:'Household', value:'Partnered · 1 dependent'},{label:'Work', value:'Operations Manager · salaried'},{label:'What matters', value:'Less anxiety · saving with intent'}] },\n      finances: { k:'finances', title:'Your Finances', status:POS, metric:'+$1,300/mo', sub:'Income, spending & investments',\n        doingHead:'You live below your means.', summary:'$5,400 comes in, $4,100 goes out. That $1,300 monthly surplus is real fuel — most of it unspoken-for.',\n        focus:[{t:'Put your surplus to work', s:'$1,300/mo is sitting idle in checking.'}],\n        doing:[{t:'Route $400/mo to savings', s:'Closes your runway gap by August', kind:'Review'},{t:'A subscription renewed higher', s:'Streaming went $14 → $16', kind:'Review'}],\n        options:[{t:'Where should my surplus go?', s:'Plan · scenario', kind:'plan'},{t:'Budgeting without spreadsheets', s:'Guide · 5 min', kind:'guide'}],\n        rows:[{label:'Take-home', value:'$5,400 / mo'},{label:'Spending', value:'$4,100 / mo'},{label:'Invested & saved', value:'$50,500'},{label:'Monthly surplus', value:'+$1,300'}] },\n      safety: { k:'safety', title:'Your Safety Net', status:AMB, metric:'2.5 mo runway', sub:'Your cushion if income stops',\n        doingHead:'A real cushion — not quite full.', summary:'$12,000 saved covers about 2.5 months. A 3-month buffer is the next rung, and a $3,200 card balance is the drag.',\n        focus:[{t:'Build a 3-month buffer', s:'Closes your single biggest gap.'}],\n        doing:[{t:'Automate $400/mo to your buffer', s:'Reaches 3 months by December', kind:'Approve'},{t:'Pay down the $3,200 card', s:'High interest is eroding progress', kind:'Review'}],\n        options:[{t:'How fast can I hit 3 months?', s:'Plan · scenario', kind:'plan'},{t:'Emergency funds, simply', s:'Guide · 4 min', kind:'guide'}],\n        rows:[{label:'Emergency fund', value:'$12,000 · 2.5 mo'},{label:'Common target', value:'3–6 months'},{label:'High-interest debt', value:'$3,200'},{label:'Backup plan', value:'Available credit line'}] },\n      protection: { k:'protection', title:'Your Protection Layer', status:GAP, metric:'1 gap flagged', sub:'What stands between you and a bad day',\n        doingHead:'Mostly covered — one real gap.', summary:'Health, auto, and renters are in place. With a dependent and no life insurance, a term policy is the missing piece.',\n        focus:[{t:'Close your life-insurance gap', s:'Someone depends on your income.'}],\n        doing:[{t:'Review a term-life quote', s:'~$28/mo for 20-year term', kind:'Review'},{t:'Confirm your auto limits', s:'Liability looks low for your assets', kind:'Review'}],\n        options:[{t:'What would my family need?', s:'Scenario · coverage', kind:'plan'},{t:'Life insurance in 10 minutes', s:'Guide · 10 min', kind:'guide'}],\n        rows:[{label:'Health', value:'Covered'},{label:'Auto', value:'Covered'},{label:'Renters', value:'Covered'},{label:'Life', value:'Gap'},{label:'Disability', value:'None'}] },\n      long: { k:'long', title:'Your Long Game', status:GAP, metric:'4% saving rate', sub:'Life later on — and the gap to close',\n        doingHead:'Behind the pace you\\u2019ll want.', summary:'Saving 4% today. The comfortable-and-free life you picked needs closer to 12–15%. Time is on your side if you start now.',\n        focus:[{t:'Bump retirement to 10%', s:'The single highest-payoff move.'}],\n        doing:[{t:'Raise contribution to 10%', s:'~$220/mo, mostly pre-tax', kind:'Approve'},{t:'Capture your full match', s:'Leaving ~$90/mo on the table', kind:'Approve'}],\n        options:[{t:'What does 65 look like?', s:'Plan · projection', kind:'plan'},{t:'Catch-up without the pain', s:'Guide · 8 min', kind:'guide'}],\n        rows:[{label:'Goal lifestyle', value:'Comfortable & free'},{label:'On track?', value:'Behind pace'},{label:'Saving rate', value:'4% of pay'},{label:'Employer match', value:'Not maxed'}] },\n      goals: { k:'goals', title:'Your Goals', status:POS, metric:'3 goals set', sub:'The targets you\\u2019re aiming at',\n        doingHead:'Three goals, clearly ranked.', summary:'You added a family fund, a car, and grad school. Each one became its own dimension you can track.',\n        focus:[{t:'Fund the family goal first', s:'Your nearest and biggest.'}],\n        doing:[{t:'Open the three goal funds', s:'We\\u2019ll set monthly targets', kind:'Approve'},{t:'Rank them by date', s:'Family, car, then school', kind:'Review'}],\n        options:[{t:'Can I afford all three?', s:'Plan · scenario', kind:'plan'},{t:'Sequencing big goals', s:'Guide · 6 min', kind:'guide'}],\n        rows:[{label:'Starting a family', value:'~2 years'},{label:'Buying a car', value:'~1 year'},{label:'Grad school', value:'~3 years'}] },\n      family: { k:'family', title:'Starting a Family', status:AMB, metric:'$1,200 of $9k', sub:'A cushion for your growing family', custom:true,\n        doingHead:'A fresh goal — let\\u2019s fund it.', summary:'First-year costs land near $9,000. You\\u2019ve set aside $1,200. A steady monthly habit gets you there in time.',\n        focus:[{t:'Start a family fund', s:'Aim for $9,000 over ~2 years.'}],\n        doing:[{t:'Auto-save $300/mo', s:'On track for your due window', kind:'Approve'},{t:'Add a parental-leave buffer', s:'Income may dip for a stretch', kind:'Review'}],\n        options:[{t:'What will baby\\u2019s first year cost?', s:'Plan · scenario', kind:'plan'},{t:'Money & a new baby', s:'Guide · 9 min', kind:'guide'}],\n        rows:[{label:'Target', value:'~$9,000'},{label:'Saved so far', value:'$1,200'},{label:'Timeline', value:'~2 years'},{label:'Monthly plan', value:'$300'}] },\n      car: { k:'car', title:'Buying a Car', status:AMB, metric:'$2k of $6k down', sub:'A down payment within reach', custom:true,\n        doingHead:'A third of the way there.', summary:'A $6,000 down payment keeps the loan sensible. You\\u2019re at $2,000 — about a year of steady saving away.',\n        focus:[{t:'Reach a $6,000 down payment', s:'Keeps your monthly note low.'}],\n        doing:[{t:'Auto-save $330/mo', s:'Hits the target in ~12 months', kind:'Approve'},{t:'Pre-check your rate', s:'Your credit looks strong', kind:'Review'}],\n        options:[{t:'New vs. used vs. lease', s:'Plan · scenario', kind:'plan'},{t:'Buying your next car', s:'Guide · 5 min', kind:'guide'}],\n        rows:[{label:'Down-payment target', value:'$6,000'},{label:'Saved so far', value:'$2,000'},{label:'Timeline', value:'~1 year'},{label:'Monthly plan', value:'$330'}] },\n      grad: { k:'grad', title:'Grad School', status:GAP, metric:'$800 of $20k', sub:'Investing in your next chapter', custom:true,\n        doingHead:'Early days — still planning.', summary:'A part-time program runs about $20,000. You\\u2019ve started with $800. We\\u2019ll weigh savings, aid, and employer help.',\n        focus:[{t:'Map tuition vs. aid', s:'Before you commit a dollar.'}],\n        doing:[{t:'Open a tuition fund', s:'Even $150/mo compounds', kind:'Approve'},{t:'Check employer assistance', s:'Many cover part of tuition', kind:'Review'}],\n        options:[{t:'Is the degree worth it?', s:'Plan · ROI scenario', kind:'plan'},{t:'Paying for grad school', s:'Guide · 8 min', kind:'guide'}],\n        rows:[{label:'Estimated cost', value:'~$20,000'},{label:'Saved so far', value:'$800'},{label:'Timeline', value:'~3 years'},{label:'Funding mix', value:'Savings · aid · employer'}] }\n    };\n  }\n\n  renderVals() {\n    const D = this.data();\n    const order = ['you','finances','safety','protection','long','goals'];\n    const goalsOrder = ['family','car','grad'];\n    const all = order.concat(goalsOrder);\n    const cur = this.state.overlay;\n    const od = cur ? D[cur] : { title:'', status:'#E86A3E', metric:'', sub:'', summary:'', doingHead:'', focus:[], doing:[], options:[], rows:[], k:'you' };\n    const VIZ = {\n      you:{big:'4 of 4', pct:100, note:'profile facts captured'},\n      finances:{big:'+$1,300', pct:24, note:'of income, unspent each month'},\n      safety:{big:'2.5 mo', pct:42, note:'toward a 6-month cushion'},\n      protection:{big:'3 of 5', pct:60, note:'coverage types in place'},\n      long:{big:'4%', pct:27, note:'of a healthy 12–15% rate'},\n      goals:{big:'3 goals', pct:100, note:'set and ranked'},\n      family:{big:'$1,200', pct:13, note:'of ~$9,000 first-year costs'},\n      car:{big:'$2,000', pct:33, note:'of a $6,000 down payment'},\n      grad:{big:'$800', pct:4, note:'of ~$20,000 tuition'}\n    };\n    const vz = cur ? VIZ[cur] : { big:'', pct:0, note:'' };\n    const softMap = { '#2E8B57':'#DEEFE2', '#C98A22':'#F6EBCF', '#DB5A3A':'#F8DFD3' };\n    const inkMap  = { '#2E8B57':'#256E45', '#C98A22':'#8A6516', '#DB5A3A':'#A23E25' };\n    const dimCards = all.map(k => {\n      const x = D[k], v = VIZ[k];\n      return Object.assign({}, x, { vizBig:v.big, vizPct:v.pct, vizNote:v.note, soft: softMap[x.status]||'#DEEFE2', ink: inkMap[x.status]||'#256E45' });\n    });\n    const open = {};\n    all.forEach(k => { open[k] = () => this.setState({ overlay:k }); });\n    const gi = ((this.state.glance % all.length) + all.length) % all.length;\n    const gk = all[gi];\n    const gd = D[gk];\n    const gv = VIZ[gk];\n    const glanceDots = all.map((_, i) => i === gi ? '#E86A3E' : '#D8CCAE');\n    const gi2 = ((this.state.glance2 % all.length) + all.length) % all.length;\n    const gk2 = all[gi2];\n    const gd2 = D[gk2];\n    const gv2 = VIZ[gk2];\n    const glance2Dots = all.map((_, i) => i === gi2 ? '#E86A3E' : '#D8CCAE');\n    const si = ((this.state.share % 3) + 3) % 3;\n    const ON = '#E86A3E', OFF = 'rgba(255,255,255,.3)';\n    return {\n      order, goalsOrder, all, dimCards,\n      open, closeOverlay:()=>this.setState({overlay:null}), overlayOpen: !!cur, od, odk: od.k,\n      vizBig: vz.big, vizPct: vz.pct, vizNote: vz.note,\n      curIsSafety: cur==='safety', curIsLong: cur==='long',\n      curIsGeneric: !!cur && cur!=='safety' && cur!=='long',\n      odSoft: od.status ? (softMap[od.status]||'#DEEFE2') : '#DEEFE2',\n      odInk:  od.status ? (inkMap[od.status]||'#256E45') : '#256E45',\n      menuOpen: this.state.menuOpen, openMenu:()=>this.setState({menuOpen:true}), closeMenu:()=>this.setState({menuOpen:false}),\n      glanceData: gd, glanceK: gk, glanceIndex: gi, glanceNum: (gi+1)+' / '+all.length,\n      glanceTitle: gd.title, glanceMetric: gd.metric, glanceSummary: gd.summary, glanceSub: gd.sub,\n      glanceStatus: gd.status, glanceBig: gv.big, glancePct: gv.pct, glanceNote: gv.note,\n      glanceSoft: softMap[gd.status]||'#DEEFE2', glanceInk: inkMap[gd.status]||'#256E45',\n      glanceDots,\n      glancePrev:()=>this.setState(s=>({glance:s.glance-1})), glanceNext:()=>this.setState(s=>({glance:s.glance+1})),\n      glance2K: gk2, glance2Title: gd2.title, glance2Metric: gd2.metric, glance2Summary: gd2.summary,\n      glance2Status: gd2.status, glance2Big: gv2.big, glance2Pct: gv2.pct, glance2Note: gv2.note,\n      glance2Ink: inkMap[gd2.status]||'#256E45', glance2Num: (gi2+1)+' / '+all.length, glance2Dots,\n      glance2Prev:()=>this.setState(s=>({glance2:s.glance2-1})), glance2Next:()=>this.setState(s=>({glance2:s.glance2+1})),\n      shareIs0: si===0, shareIs1: si===1, shareIs2: si===2,\n      dotA: si===0?ON:OFF, dotB: si===1?ON:OFF, dotC: si===2?ON:OFF,\n      nextShare:()=>this.setState(s=>({share:(s.share+1)%3}))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
